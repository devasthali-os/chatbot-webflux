spring:
  profiles:
    active: mock-llm

chat:
  max-concurrent-streams: 10
  system-prompt: "Test assistant"
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:8080
      - http://127.0.0.1:8080
  llm:
    provider: mock
    base-url: http://127.0.0.1:11434
    model: mock
    max-tokens: 100
    connect-timeout: 1s
    read-timeout: 5s

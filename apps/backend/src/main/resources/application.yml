server:
  port: 8080

chat:
  cors:
    # Vite may use 5174+ when 5173 is busy; patterns avoid 403 on proxied /v1 requests.
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*
  max-concurrent-streams: 2
  system-prompt: "You are a helpful assistant. Answer clearly and concisely."
  llm:
    provider: ollama
    base-url: http://127.0.0.1:11434
    model: llama3.2:1b
    max-tokens: 384
    connect-timeout: 5s
    read-timeout: 180s

spring:
  application:
    name: chatbot-backend

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.chatbot: DEBUG
